name: Weekly SEO Report

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install anthropic requests google-auth google-api-python-client
      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python3 automation/weekly-report-generator.py
      - name: Commit report
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "EmailToolAdviser Weekly Report"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "Weekly SEO report $(date +%Y-%m-%d)"
          git push
